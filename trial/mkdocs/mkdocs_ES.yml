site_name: DinghyGo Manual de usuario (Español)
site_description: Manual de usuario oficial para las embarcaciones de vela inflables DinghyGo
site_author: Aquacrafts B.V.
copyright: "© Aquacrafts B.V. — v5.0 mayo 2026"

extra:
  generator: false

extra_css:
  - stylesheets/extra.css?v=2
  - stylesheets/pdf.css?v=2

theme:
  name: material
  logo: images/logo_black.png
  favicon: images/logo_black.png
  palette:
    primary: custom
    accent: custom
  font:
    text: false
    code: false
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.tooltips

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - toc:
      permalink: true
      toc_depth: 4

nav:
  - Portada: index_FR.md
  - Índice: contents_FR.md
  - Manual de usuario: manual_ES.md
