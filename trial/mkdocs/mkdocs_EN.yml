site_name: DinghyGo Owner's Manual
site_description: Official Owner's Manual for DinghyGo inflatable sailing dinghies
site_author: Aquacrafts B.V.
copyright: "© Aquacrafts B.V. — v5.0 May 2026"

extra:
  generator: false

extra_css:
  - stylesheets/extra.css?v=2
  - stylesheets/pdf.css?v=2

theme:
  name: material
  logo: images/logo_black.png
  favicon: images/logo_black.png
  palette:
    primary: custom
    accent: custom
  font:
    text: false
    code: false
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.tooltips

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - toc:
      permalink: true
      toc_depth: 4

nav:
  - Cover: index.md
  - Index: contents.md
  - Manual: manual.md
